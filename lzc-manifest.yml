application:
  subdomain: smarticky
  background_task: true
  public_path:
    - /
  upstreams:
    - location: /
      backend: http://smarticky:8080/
  injects:
    - id: open-save-chooser
      on: browser
      when:
        - "/*"
      do:
        - src: file:///lzcapp/pkg/content/lazycat-injects/lzc-file-chooser-inject.js

services:
  smarticky:
    user: root
    image: embed:smarticky
    binds:
      - /lzcapp/var/data:/data
    environment:
      - SMARTICKY_DATA_DIR=/data
      - PORT=8080

usage: |
  打开应用后完成首次账号设置，即可使用 Smartisan 风格笔记工作台。
  数据持久化保存在 /data，支持 Markdown 编辑和 Evernote ENEX 导入。
